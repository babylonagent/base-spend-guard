name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: MCP stdio smoke test
        run: node packages/mcp/test/smoke.mjs

      - name: Pack dry-run (publish prep)
        run: |
          npm pack --workspace @spendguard/core --dry-run
          npm pack --workspace @spendguard/sdk --dry-run
          npm pack --workspace @spendguard/mcp --dry-run
